<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document Approval Portal mock API</title>
    <style>
      :root {
        color: #24292f;
        background: #f6f8fa;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 20px;
      }

      main {
        padding: 32px;
        border: 1px solid #d0d7de;
        border-radius: 12px;
        background: white;
        box-shadow: 0 8px 24px rgb(140 149 159 / 20%);
      }

      h1 {
        margin-top: 0;
        font-size: clamp(1.6rem, 6vw, 2.25rem);
      }

      h2 {
        margin-top: 32px;
        font-size: 1.15rem;
      }

      ul {
        padding-left: 20px;
      }

      li {
        margin: 10px 0;
      }

      a {
        color: #0969da;
      }

      code {
        padding: 2px 6px;
        border-radius: 5px;
        background: #eff1f3;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Document Approval Portal mock API</h1>
      <p>The mock service is ready.</p>

      <h2>Resources</h2>
      <ul>
        <li><a href="/documents">/documents</a></li>
        <li><a href="/users">/users</a></li>
      </ul>

      <h2>PDF upload</h2>
      <p>
        Send a <code>POST</code> request to <code>/uploads</code> using
        <code>multipart/form-data</code> with a PDF in the <code>file</code> field.
      </p>

      <h2>Supported methods</h2>
      <p><code>GET</code> <code>POST</code> <code>PUT</code> <code>OPTIONS</code></p>
    </main>
  </body>
</html>
